# Auto-deploy to Cloud Run on push to main.
# Requires repo secret GCP_SA_KEY (JSON for the presequel-deployer service account).

name: Cloud Run Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GCP_PROJECT: datadog-community
  REGION: us-central1
  SERVICE: presequel
  IMAGE_REPO: us-central1-docker.pkg.dev/datadog-community/presequel/presequel

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT }}

      - name: Build + push image to Artifact Registry
        run: |
          gcloud builds submit \
            --tag "${{ env.IMAGE_REPO }}:${{ github.sha }}" \
            --quiet

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ env.SERVICE }}" \
            --image "${{ env.IMAGE_REPO }}:${{ github.sha }}" \
            --region "${{ env.REGION }}" \
            --platform managed \
            --quiet
