# fly.toml app configuration file generated for presequel on 2026-04-24T16:08:10-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'presequel'
primary_region = 'ord'

[build]

[env]
  DD_ENV = 'prod'
  DD_LOGS_INJECTION = 'true'
  DD_SERVICE = 'chrono-consulting'
  DD_SITE = 'us5.datadoghq.com'
  DD_TRACE_ENABLED = 'true'
  DD_VERSION = '0.1.0'
  NODE_ENV = 'production'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
